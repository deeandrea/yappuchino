name: Deploy to Render + GitHub Status

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Create Deployment
        id: deployment
        uses: bobheadxi/deployments@v1
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          env: production
          environment_url: https://yappachino.onrender.com

      - name: Trigger Render Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Mark Success
        if: success()
        uses: bobheadxi/deployments@v1
        with:
          step: finish
          status: success
          token: ${{ secrets.GITHUB_TOKEN }}
          env: production
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
          environment_url: https://yappachino.onrender.com

      - name: Mark Failure
        if: failure()
        uses: bobheadxi/deployments@v1
        with:
          step: finish
          status: failure
          token: ${{ secrets.GITHUB_TOKEN }}
          env: production
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}